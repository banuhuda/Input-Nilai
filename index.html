<!DOCTYPE html><html><head>  <base target="_top">  <meta charset="utf-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- Tailwind CSS -->  <script src="https://cdn.tailwindcss.com"></script>  <!-- React & ReactDOM -->  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>  <!-- Babel untuk JSX -->  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>  <!-- Phosphor Icons (Pengganti Lucide untuk versi CDN murni) -->  <script src="https://unpkg.com/@phosphor-icons/web"></script>    <style>    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }    /* Animasi sederhana */    .animate-in { animation: fadeIn 0.3s ease-out; }    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }  </style></head><body>  <div id="root"></div>  <script type="text/babel">    const { useState, useEffect } = React;    const STUDENTS = [      "ADIKA YUDA ROHIM", "AHMAD JERI MARDIANSAH", "ANANDA RISKI", "ANDIKA PRATAMA",      "DAFA FIRMAN WIJAYA", "DIMAS AKBAR SANJAYA", "EGI RAMDANI", "EKA PUTRI SETIA NINGSIH",      "EKWAN APANDI", "FADILA SITI NURASIA JAMIL", "HANNA TERESIA PURBA", "JUPITA FIRNANDA",      "NUR HIDAYATI", "REZA SATRIA", "RIRIN PUSPITASARI", "SANDO APRIANSAH", "WISNU EKA PRATAMA", "YULIANA"    ];    const SUBJECTS = [      "IPA", "IPS", "Seni Budaya", "Prakarya", "Matematika", "Agama",      "Mulok", "PKn", "Bahasa Indonesia", "Bahasa Inggris", "Penjaskes"    ];    const KKM = 71;    // Polyfill/Mock objek google agar aplikasi bisa di-preview tanpa error di luar lingkungan Apps Script    if (typeof google === 'undefined') {      window.google = {        script: {          run: {            withSuccessHandler: function(callback) {              return {                getInitialData: function() {                  const mockData = {};                  STUDENTS.forEach(student => {                    mockData[student] = {};                    SUBJECTS.forEach(sub => mockData[student][sub] = '');                  });                  setTimeout(() => callback(mockData), 800); // Simulasi delay server                },                saveSubjectData: function(subject, data) {                  setTimeout(() => callback(), 800); // Simulasi delay server                }              };            }          }        }      };    }    const App = () => {      const [activeTab, setActiveTab] = useState('input');      const [selectedSubject, setSelectedSubject] = useState('');      const [formData, setFormData] = useState({});      const [showToast, setShowToast] = useState(false);      const [gradesData, setGradesData] = useState({});            // Status sinkronisasi ke server GAS      const [isLoading, setIsLoading] = useState(true);      const [isSaving, setIsSaving] = useState(false);      // Mengambil data dari server Google Sheets saat aplikasi pertama dibuka      useEffect(() => {        setIsLoading(true);        google.script.run          .withSuccessHandler((data) => {            setGradesData(data);            setIsLoading(false);          })          .getInitialData();      }, []);      useEffect(() => {        if (selectedSubject && !isLoading) {          const currentSubjectGrades = {};          STUDENTS.forEach(student => {            currentSubjectGrades[student] = gradesData[student][selectedSubject];          });          setFormData(currentSubjectGrades);        }      }, [selectedSubject, gradesData, isLoading]);      const handleInputChange = (student, value) => {        let numValue = value === '' ? '' : parseFloat(value);        if (numValue !== '' && (numValue < 0 || numValue > 100)) return;                setFormData(prev => ({ ...prev, [student]: value }));      };      const handleSave = () => {        if (!selectedSubject) return;        setIsSaving(true);        // Menyiapkan format angka untuk disimpan        const dataToSave = {};        STUDENTS.forEach(student => {          dataToSave[student] = formData[student] !== '' ? parseFloat(formData[student]) : '';        });        // Simpan ke Google Sheets via google.script.run        google.script.run          .withSuccessHandler(() => {            // Update tampilan lokal tanpa perlu merefresh seluruh data server            setGradesData(prev => {              const newData = { ...prev };              STUDENTS.forEach(student => {                newData[student] = { ...newData[student], [selectedSubject]: dataToSave[student] };              });              return newData;            });            setIsSaving(false);            setShowToast(true);            setTimeout(() => setShowToast(false), 3000);          })          .saveSubjectData(selectedSubject, dataToSave);      };      const calculateAverage = (grades) => {        if(!grades) return 0;        const values = Object.values(grades).filter(val => val !== '');        if (values.length === 0) return 0;        const sum = values.reduce((acc, curr) => acc + parseFloat(curr), 0);        return (sum / SUBJECTS.length).toFixed(2);      };      if (isLoading) {        return (          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-100 text-slate-500">            <i className="ph ph-spinner-gap animate-spin text-4xl text-indigo-600 mb-4"></i>            <p className="font-semibold text-lg animate-pulse">Menghubungkan ke Google Sheets...</p>          </div>        );      }      const renderInputForm = () => (        <div className="max-w-3xl mx-auto animate-in">          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">            <div className="bg-indigo-600 px-6 py-8 text-white">              <h2 className="text-2xl font-bold flex items-center gap-2">                <i className="ph ph-user-check text-3xl"></i>                Input Nilai Siswa              </h2>              <p className="text-indigo-100 mt-2">Pilih mata pelajaran dan masukkan nilai (0.00 - 100.00).</p>            </div>                        <div className="p-6">              <div className="mb-8">                <label className="block text-sm font-semibold text-slate-700 mb-2">Pilih Mata Pelajaran</label>                <select                   className="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"                  value={selectedSubject}                  onChange={(e) => setSelectedSubject(e.target.value)}                >                  <option value="">-- Silakan Pilih Mata Pelajaran --</option>                  {SUBJECTS.map(subject => (                    <option key={subject} value={subject}>{subject}</option>                  ))}                </select>              </div>              {selectedSubject && (                <>                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">                    {STUDENTS.map(student => (                      <div key={student} className="bg-slate-50 p-4 rounded-xl border border-slate-100 hover:border-indigo-200 transition-colors">                        <label className="block text-xs font-bold text-slate-600 mb-2 truncate" title={student}>{student}</label>                        <input                          type="number" step="0.01" min="0" max="100"                          className="w-full p-2.5 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-semibold"                          value={formData[student] !== undefined ? formData[student] : ''}                          onChange={(e) => handleInputChange(student, e.target.value)}                          placeholder="0.00"                        />                      </div>                    ))}                  </div>                  <div className="mt-8 flex justify-end gap-3">                    <button                       onClick={() => {                        const clearedData = {};                        STUDENTS.forEach(student => clearedData[student] = '');                        setFormData(clearedData);                      }}                      disabled={isSaving}                      className="flex items-center gap-2 bg-rose-50 hover:bg-rose-100 text-rose-600 px-6 py-3 rounded-xl font-semibold border border-rose-200 disabled:opacity-50"                    >                      <i className="ph ph-trash text-xl"></i>                      Kosongkan Input                    </button>                    <button                       onClick={handleSave}                      disabled={isSaving}                      className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-semibold shadow-md disabled:opacity-50"                    >                      {isSaving ? <i className="ph ph-spinner animate-spin text-xl"></i> : <i className="ph ph-floppy-disk text-xl"></i>}                      {isSaving ? 'Menyimpan...' : 'Simpan Perubahan'}                    </button>                  </div>                </>              )}            </div>          </div>        </div>      );      const renderDashboard = () => (        <div className="animate-in">          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">            <div className="px-6 py-5 border-b border-slate-200 flex justify-between items-center bg-slate-50">              <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">                <i className="ph ph-squares-four text-indigo-600 text-2xl"></i>                Dashboard Nilai Ijazah              </h2>              <div className="text-sm font-medium text-slate-500 bg-white px-3 py-1.5 rounded-full shadow-sm border border-slate-200">                KKM: <span className="text-indigo-600 font-bold">{KKM}</span>              </div>            </div>                        <div className="overflow-x-auto">              <table className="w-full text-left border-collapse">                <thead>                  <tr className="bg-indigo-600 text-white text-sm whitespace-nowrap">                    <th className="p-4 font-semibold border-b border-indigo-700">No</th>                    <th className="p-4 font-semibold border-b border-indigo-700 sticky left-0 bg-indigo-600 z-10">Nama Siswa</th>                    {SUBJECTS.map(sub => (                      <th                         key={sub}                         className="p-4 font-semibold border-b border-indigo-700 text-center cursor-pointer hover:bg-indigo-500"                        onClick={() => { setSelectedSubject(sub); setActiveTab('input'); }}                      >                        <div className="flex items-center justify-center gap-1.5">                          {sub} <i className="ph ph-pencil-simple text-indigo-300"></i>                        </div>                      </th>                    ))}                    <th className="p-4 font-semibold border-b border-indigo-700 text-center bg-indigo-700">Rata-rata</th>                  </tr>                </thead>                <tbody className="text-sm divide-y divide-slate-200">                  {STUDENTS.map((student, index) => {                    const studentGrades = gradesData[student] || {};                    const avg = calculateAverage(studentGrades);                    const hasGrades = Object.values(studentGrades).some(val => val !== '');                    return (                      <tr key={student} className="hover:bg-indigo-50/50">                        <td className="p-4 text-slate-500 text-center">{index + 1}</td>                        <td className="p-4 font-semibold text-slate-800 sticky left-0 bg-white z-10">{student}</td>                        {SUBJECTS.map(sub => {                          const gradeValue = studentGrades[sub];                          const displayValue = gradeValue !== '' ? Number(gradeValue).toFixed(2) : '-';                          const isBelowKKM = gradeValue !== '' && Number(gradeValue) < KKM;                          return (                            <td                               key={sub}                               className={`p-4 text-center cursor-pointer relative group border-r border-slate-100 ${                                isBelowKKM ? 'bg-red-500 hover:bg-red-600' : 'hover:bg-indigo-100'                              }`}                              onClick={() => { setSelectedSubject(sub); setActiveTab('input'); }}                            >                              <span className={`font-medium ${gradeValue !== '' ? (isBelowKKM ? 'text-white' : 'text-slate-700') : 'text-slate-300'}`}>                                {displayValue}                              </span>                              <i className={`ph-fill ph-pencil-simple absolute top-2 right-2 opacity-0 group-hover:opacity-100 ${isBelowKKM ? 'text-red-200' : 'text-indigo-400'}`}></i>                            </td>                          );                        })}                        <td className="p-4 text-center bg-slate-50 font-bold text-slate-800">                          {hasGrades ? Number(avg).toFixed(2) : '-'}                        </td>                      </tr>                    );                  })}                </tbody>              </table>            </div>          </div>        </div>      );      return (        <div className="min-h-screen pb-12">          <header className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">              <div className="flex justify-between items-center h-16">                <div className="flex items-center gap-3">                  <div className="bg-indigo-600 p-2 rounded-lg text-white">                    <i className="ph ph-graduation-cap text-2xl"></i>                  </div>                  <h1 className="text-xl font-bold text-indigo-700 hidden sm:block">Hasil Penilaian</h1>                </div>                <div className="flex gap-2">                  <button                    onClick={() => setActiveTab('input')}                    className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold transition-all ${                      activeTab === 'input' ? 'bg-indigo-50 text-indigo-700 border border-indigo-100' : 'text-slate-600 hover:bg-slate-50'                    }`}                  >                    <i className="ph ph-book-open text-lg"></i> Form                  </button>                  <button                    onClick={() => setActiveTab('dashboard')}                    className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold transition-all ${                      activeTab === 'dashboard' ? 'bg-indigo-50 text-indigo-700 border border-indigo-100' : 'text-slate-600 hover:bg-slate-50'                    }`}                  >                    <i className="ph ph-squares-four text-lg"></i> Dashboard                  </button>                </div>              </div>            </div>          </header>          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">            {activeTab === 'input' ? renderInputForm() : renderDashboard()}          </main>          {showToast && (            <div className="fixed bottom-6 right-6 bg-emerald-600 text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3 animate-in z-50">              <i className="ph-fill ph-check-circle text-2xl"></i>              <span className="font-semibold">Nilai {selectedSubject} berhasil disimpan!</span>            </div>          )}        </div>      );    }    const root = ReactDOM.createRoot(document.getElementById('root'));    root.render(<App />);  </script></body></html>
